# Claude Code Review via Amazon Bedrock (Claude Opus 4.6)
#
# Required secrets:
#   AWS_ACCESS_KEY_ID     - IAM access key with bedrock:InvokeModel permission
#   AWS_SECRET_ACCESS_KEY - Corresponding secret key
#   AWS_SESSION_TOKEN     - Session token (optional, only for temporary/STS credentials)
#   AWS_REGION            - AWS region where Bedrock is enabled (e.g. us-east-1)
#
# The GITHUB_TOKEN is provided automatically by GitHub Actions.

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # Run on PR events, or on issue_comment only if it's on a PR and mentions @claude-review
    if: >
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude-review') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.author_association == 'OWNER'
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.pr.outputs.number }}
        run: |
          if ! gh pr diff "$PR_NUM" > /tmp/pr_diff.txt; then
            echo "::error::Failed to fetch PR diff"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run Claude review
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/claude_review.py < /tmp/pr_diff.txt
