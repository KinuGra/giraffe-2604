services:
  # --- データストア ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 5s
      retries: 10
  # --- Database Service ---
  database:
    build:
      context: .
      dockerfile: services/database/Dockerfile
    ports:
      - "50056:50056"
    environment:
      DATABASE_URL: postgres://dev:dev@postgres:5432/user_db?sslmode=disable&default_query_exec_mode=simple_protocol
    depends_on:
      postgres:
        condition: service_healthy
  # --- API Gateway（gin）---
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      FUNCTIONS_GRPC_ADDR: functions:50055
      DATABASE_GRPC_ADDR: database:50056
      STORAGE_GRPC_ADDR: storage:50054
    depends_on: [postgres]
  # --- Functions Service ---
  functions:
    build:
      context: .
      dockerfile: services/functions/Dockerfile
    ports:
      - "50055:50055"
    environment:
      DATABASE_URL: postgres://dev:dev@postgres:5432/functions_db?sslmode=disable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
  # --- Storage Service ---
  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    ports:
      - "50054:50054"
    environment:
      GRPC_PORT: "50054"
      STORAGE_DATA_DIR: /data
    volumes:
      - storage-data:/data
  # --- Next.js ダッシュボード ---
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on: [gateway]
volumes:
  pgdata:
  storage-data:
