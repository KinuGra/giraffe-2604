apiVersion: apps/v1
kind: Deployment
metadata:
  name: functions
  labels:
    app: functions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: functions
  template:
    metadata:
      labels:
        app: functions
    spec:
      containers:
        - name: functions
          image: 517027174598.dkr.ecr.ap-northeast-1.amazonaws.com/functions:v1.0.0
          ports:
            - containerPort: 50055
          env:
            - name: DATABASE_URL
              value: "postgres://dev:dev@postgres:5432/functions_db?sslmode=disable"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: functions
  labels:
    app: functions
spec:
  selector:
    app: functions
  ports:
    - port: 50055
      targetPort: 50055
      protocol: TCP
