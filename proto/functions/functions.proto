syntax = "proto3";
package functions;
option go_package = "github.com/KinuGra/giraffe-2604/gen/functions";

service FunctionsService {
  rpc CreateFunction(CreateFunctionRequest) returns (FunctionInfo);
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
  rpc GetFunction(GetFunctionRequest) returns (FunctionInfo);
  rpc GetFunctionByName(GetFunctionByNameRequest) returns (FunctionInfo);
  rpc ExecuteFunction(ExecuteFunctionRequest) returns (ExecuteFunctionResponse);
  rpc UpdateFunction(UpdateFunctionRequest) returns (FunctionInfo);
  rpc DeleteFunction(DeleteFunctionRequest) returns (DeleteFunctionResponse);
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse);
}

message CreateFunctionRequest {
  string name = 1;
  string runtime = 2;
  string code = 3;
  int32 timeout_sec = 4;
}

message FunctionInfo {
  string id = 1;
  string name = 2;
  string runtime = 3;
  string code = 4;
  string created_at = 5;
  int32 timeout_sec = 6;
}

message ListFunctionsRequest {}

message ListFunctionsResponse {
  repeated FunctionInfo functions = 1;
}

message GetFunctionRequest {
  string function_id = 1;
}

message GetFunctionByNameRequest {
  string name = 1;
}

message ExecuteFunctionRequest {
  string function_id = 1;
  int32 timeout_sec = 2;
  map<string, string> env = 3;
  string stdin = 4;
}

message ExecuteFunctionResponse {
  string output = 1;
  string error = 2;
  int32 exit_code = 3;
  int64 duration_ms = 4;
}

message UpdateFunctionRequest {
  string function_id = 1;
  string name = 2;
  string code = 3;
  int32 timeout_sec = 4;
}

message DeleteFunctionRequest {
  string function_id = 1;
}

message DeleteFunctionResponse {
  bool success = 1;
}

message ExecutionLogInfo {
  string id = 1;
  string function_id = 2;
  string output = 3;
  string error = 4;
  int32 exit_code = 5;
  int64 duration_ms = 6;
  string created_at = 7;
}

message ListLogsRequest {
  string function_id = 1;
}

message ListLogsResponse {
  repeated ExecutionLogInfo logs = 1;
}
